services:
  - type: web
    name: aic-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///aic_demo.db
